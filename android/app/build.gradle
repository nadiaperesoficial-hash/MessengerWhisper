plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0"

android {
    namespace "com.nitinproject.whatsappredesign"
    compileSdk 34
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8.toString()
    }

    defaultConfig {
        applicationId "com.nitinproject.whatsappredesign"
        minSdk 23
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    buildTypes {
        debug {
            // build debug puro, usa o keystore de debug automático do SDK
        }
        release {
            // ainda sem keystore de release; builda assinado como debug por enquanto
            signingConfig signingConfigs.debug
        }
    }
}

// Necessário: expõe flutter.compileSdkVersion / minSdkVersion / targetSdkVersion
// pros plugins-dependência (app_links, etc.) conseguirem ler.
flutter {
    source "../.."
    compileSdkVersion 34
    minSdkVersion 23
    targetSdkVersion 34
}

dependencies {
    implementation platform("com.google.firebase:firebase-bom:33.5.1")
    implementation "androidx.multidex:multidex:2.0.1"
}
