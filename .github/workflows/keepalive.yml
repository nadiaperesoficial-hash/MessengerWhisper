name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 6 */5 * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Instância A (principal)
        run: |
          curl -s -o /dev/null -w "Instância A respondeu: %{http_code}\n" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"

      - name: Ping Instância B (media)
        run: |
          curl -s -o /dev/null -w "Instância B respondeu: %{http_code}\n" \
            "${{ secrets.SUPABASE_B_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_B_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_B_ANON_KEY }}"
