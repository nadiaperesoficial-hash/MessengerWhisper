name: whatsapp_redesign
description: Chat app baseado em Flutter + Supabase + Agora + Firebase FCM
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  intl: ^0.20.2

  provider: ^6.1.2

  supabase_flutter: ^2.6.0

  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.3.1

  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  giphy_get: ^3.5.4

  image_picker: ^1.1.2

  sqflite: ^2.4.1
  path: ^1.9.0

  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/wallpapers/native.png
    - assets/wallpapers/option1.png
    - assets/wallpapers/option2.png
    - assets/wallpapers/option3.png
    - assets/wallpapers/option4.png
