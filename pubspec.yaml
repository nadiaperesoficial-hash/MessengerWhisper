name: messenger_app
description: Chat app baseado em Flutter + Supabase + Agora + Firebase FCM
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI (mantidas do fork original)
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  intl: ^0.20.2

  # Estado
  provider: ^6.1.2

  # Backend principal
  supabase_flutter: ^2.6.0

  # Chamadas de áudio/vídeo
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.3.1

  # Push notification (só FCM)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  # GIFs
  giphy_get: ^3.5.4

  # Mídia (fotos/stories/anexos)
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
